# Publish to npm when you publish a GitHub Release (not draft).
#
# Uses npm Trusted Publishing (OIDC) — no NPM_TOKEN secret.
# Configure once on npmjs.com: Package → Settings → Trusted publishing → GitHub Actions
#   - Repository: smartguy0505/bittensor-wallet (owner/repo)
#   - Workflow filename: publish-npm.yml  (exact name, case-sensitive)
#
# Requirements (npm): Node ≥ 22.14, npm CLI ≥ 11.5.1
# https://docs.npmjs.com/trusted-publishers

name: Publish to npm

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write # required for OIDC → npm trusted publishing

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          # Trusted publishing requires Node 22.14+ (see npm docs)
          node-version: "22"
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Ensure npm CLI for trusted publishing
        run: npm install -g npm@^11.5.1

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      # OIDC auth is automatic on GitHub-hosted runners; do not set NODE_AUTH_TOKEN here.
      # Provenance is generated automatically when publishing via trusted publishing.
      - name: Publish to npm
        run: npm publish --access public
