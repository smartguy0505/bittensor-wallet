# Publish to npm when you publish a GitHub Release (not draft).
#
# Before releasing:
# 1. Bump "version" in package.json and commit.
# 2. Tag the commit (e.g. git tag v0.1.0 && git push origin v0.1.0).
# 3. Create a GitHub Release from that tag.
#
# Repo secret (Settings → Secrets → Actions):
#   NPM_TOKEN — create at https://www.npmjs.com/settings/~/tokens
#   (Automation token is recommended for CI.)

name: Publish to npm

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Publish to npm
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
